server:
  port: 8082

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      mvc:
        routes:
          - id: account-service
            uri: http://localhost:9091
            predicates:
              - Path=/accounts/**
              
          - id: customer-service
            uri: http://localhost:9092
            predicates:
              - Path=/customer/**    